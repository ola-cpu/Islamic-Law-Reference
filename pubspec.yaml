name: islamic_law_reference
description: "Offline fiqh encyclopedia — 500+ topics, 5 madhhabs, 5 languages."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.4.0+3
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.1
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  share_plus: ^12.0.1
  flutter_tts: ^4.2.5
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  go_router: ^17.3.0
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  home_widget: ^0.9.3
  pdf: ^3.12.0
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  url_launcher: ^6.3.1
  encrypt: ^5.0.3
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: store/icon/app_icon.png
  adaptive_icon_background: "#1B5E4B"
  adaptive_icon_foreground: store/icon/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/content/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
